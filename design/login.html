<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Arca N. S. da Providência</title>
<style>
:root {
  --bg: oklch(97.5% 0.005 85);
  --surface: oklch(100% 0 0);
  --fg: oklch(25% 0.06 250);
  --muted: oklch(50% 0.03 250);
  --border: oklch(90% 0.008 85);
  --accent: oklch(25% 0.06 250);
  --accent-light: oklch(94% 0.02 250);
  --gold: oklch(72% 0.10 80);
  --danger: oklch(52% 0.16 25);
  --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  --radius: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font: 16px/1.55 var(--font-body);
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px 16px;
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 32px;
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}
.login-header h1 {
  font: 600 24px/1.2 var(--font-display);
  letter-spacing: -0.01em;
}
.login-header p {
  font-size: 14px;
  color: var(--muted);
  margin-top: 6px;
}

.field {
  margin-bottom: 18px;
}
.field label {
  display: block;
  font-size: 13px;
  font-weight: 550;
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  padding: 11px 14px;
  font: 15px/1.5 var(--font-body);
  color: var(--fg);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.field input:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

.error-banner {
  background: oklch(95% 0.04 25);
  color: var(--danger);
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 6px;
  margin-bottom: 18px;
  display: none;
}
.error-banner.visible { display: block; }

.btn-login {
  width: 100%;
  padding: 12px;
  font: 550 14px/1 var(--font-body);
  letter-spacing: 0.02em;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-login:hover {
  background: oklch(22% 0.06 250);
}
.btn-login:active {
  transform: translateY(1px);
}
.btn-login:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}
.btn-login[disabled] {
  opacity: 0.5;
  cursor: not-allowed;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--muted);
  text-decoration: none;
}
.back-link:hover {
  color: var(--accent);
}

.credentials-hint {
  margin-top: 24px;
  padding: 12px;
  background: oklch(94% 0.03 80);
  border-radius: 6px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
}
.credentials-hint strong {
  color: var(--fg);
}

@media (max-width: 440px) {
  .login-card { padding: 28px 20px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <svg width="72" height="72" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo Arca N. S. da Providência" style="margin-bottom:16px;">
  <defs><clipPath id="login-clip"><circle cx="110" cy="110" r="84"/></clipPath><radialGradient id="login-bg" cx="50%" cy="45%" r="55%"><stop offset="0%" stop-color="#1e2a4a"/><stop offset="100%" stop-color="#0f1729"/></radialGradient></defs>
  <circle cx="110" cy="110" r="106" fill="url(#login-bg)" stroke="#c9a84c" stroke-width="3"/>
  <circle cx="110" cy="110" r="98" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.35"/>
  <image href="base1.png" x="22" y="30" width="176" height="184" clip-path="url(#login-clip)" preserveAspectRatio="xMidYMid slice"/>
  <circle cx="110" cy="110" r="84" fill="none" stroke="#0f1729" stroke-width="12" opacity="0.2"/>
  <path id="login-top" d="M 18,110 a 92,92 0 0,1 184,0" fill="none"/>
  <text fill="#c9a84c" font-family="'Iowan Old Style','Charter','Palatino',Georgia,serif" font-size="12.5" font-weight="700" letter-spacing="0.18em"><textPath href="#login-top" startOffset="50%" text-anchor="middle">ARCA</textPath></text>
  <path id="login-bot" d="M 20,118 a 90,90 0 0,0 180,0" fill="none"/>
  <text fill="#c9a84c" font-family="'Iowan Old Style','Charter','Palatino',Georgia,serif" font-size="11" font-weight="700" letter-spacing="0.14em"><textPath href="#login-bot" startOffset="50%" text-anchor="middle">N. S. DA PROVIDÊNCIA</textPath></text>
</svg>
    <div class="login-logo-text" style="font:600 12px/1 var(--font-body); letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:12px;">Arca N. S. da Providência</div>
    <h1>Área Administrativa</h1>
    <p>Acesso restrito à direção</p>
  </div>

  <div class="error-banner" id="error-banner" role="alert" aria-live="polite">Usuário ou senha incorretos.</div>

  <form id="login-form" novalidate>
    <div class="field">
      <label for="user">Usuário</label>
      <input type="text" id="user" autocomplete="username" placeholder="admin">
    </div>
    <div class="field">
      <label for="pass">Senha</label>
      <input type="password" id="pass" autocomplete="current-password" placeholder="••••••">
    </div>
    <button type="submit" class="btn-login">Entrar</button>
  </form>

  <div class="credentials-hint">
    Para demonstração: <strong>admin</strong> / <strong>admin</strong>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var user = document.getElementById('user').value.trim();
  var pass = document.getElementById('pass').value;

  if (user === 'admin' && pass === 'admin') {
    localStorage.setItem('bolsa_auth', 'true');
    localStorage.setItem('bolsa_auth_time', Date.now().toString());
    window.location.href = 'admin.html';
  } else {
    document.getElementById('error-banner').classList.add('visible');
  }
});

document.querySelectorAll('#login-form input').forEach(function(inp) {
  inp.addEventListener('input', function() {
    document.getElementById('error-banner').classList.remove('visible');
  });
});
</script>
</body>
</html>
